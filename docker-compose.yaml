# Hippocampus with the default embedded SQLite storage. The database file lives in a named
# volume so it survives container replacement.
#
#   docker compose up --build
#
# Observability (optional): the `observability` profile adds an all-in-one grafana/otel-lgtm
# collector (Grafana + Prometheus + Tempo + Loki). Start it and tell the service to ship to it:
#
#   OBSERVABILITY=true docker compose --profile observability up --build
#
# Then open Grafana at http://localhost:3000. Without OBSERVABILITY set, metrics/traces stay off
# and the service never attempts (or logs a failure) to export.

services:
  hippocampus:
    build:
      context: .
      # VERSION is stamped into the binary at build time (see the Dockerfile). It defaults to "dev"
      # so a plain `docker compose up --build` is unchanged; set VERSION to build a specific tag.
      args:
        VERSION: "${VERSION:-dev}"
    ports:
      - "50051:50051" # gRPC
      - "8080:8080" # HTTP/JSON gateway (+ /healthz)
    volumes:
      - hippocampus-data:/data
    environment:
      HIPPOCAMPUS_OBSERVABILITY_METRICS_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_TRACING_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_ENDPOINT: "otel-lgtm:4317"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_INSECURE: "true"

  # Optional MCP bridge over the streamable-HTTP transport, so an MCP host (Claude Desktop/Code) can
  # reach this embedded instance's memory tools over the network. Off by default; started only with
  # `--profile mcp`. It dials the hippocampus service over the compose network and exposes the MCP
  # endpoint on :8090. The more common local pattern is the stdio transport, where the host spawns
  # the binary itself and dials the exposed :50051 - no container needed; see docs/mcp.md. This
  # endpoint is unauthenticated, like the rest of this demo stack - do not expose it as-is.
  mcp:
    build:
      context: .
      target: mcp
      args:
        VERSION: "${VERSION:-dev}"
    profiles: ["mcp"]
    command:
      - "--address"
      - "hippocampus:50051"
      - "--transport"
      - "http"
      - "--http-address"
      - ":8090"
    ports:
      - "8090:8090" # streamable-HTTP MCP endpoint
    depends_on:
      - hippocampus

  # All-in-one observability backend. Off by default; started only with `--profile observability`.
  # The Hippocampus overview dashboard is provisioned in and set as the Grafana home page.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["observability"]
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP/gRPC ingest
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json
    volumes:
      - ./docker/observability/hippocampus-dashboard.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json:ro
      - ./docker/observability/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro

volumes:
  hippocampus-data:
