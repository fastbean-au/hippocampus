name: Release

# Driven entirely by semver tags: the tag IS the release label and the Go module version, so the
# two can never drift. Cut a release with `git tag vX.Y.Z && git push --tags`; this workflow runs
# the test suite as a gate, creates the GitHub release from the tag, and then
# builds and publishes the container image to GHCR. Coverage is reported to Coveralls by the CI
# workflow on push to main (a tag run would file it under the tag ref, not main). The same tag is
# stamped into the binary at
# build time via -ldflags (see the Dockerfile), so a running instance reports the release version
# through --version and /healthz.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # create the GitHub release from the tag

    # The same service containers as CI, so coverage reflects the postgres/mysql/opensearch
    # integration tests rather than only the SQLite paths - the coverage number reported to
    # Coveralls should be the real one, not the subset that runs without dependencies.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: hippocampus
          POSTGRES_PASSWORD: hippocampus
          POSTGRES_DB: hippocampus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hippocampus -d hippocampus_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: hippocampus
          MYSQL_PASSWORD: hippocampus
          MYSQL_DATABASE: hippocampus_test
          MYSQL_ROOT_PASSWORD: hippocampus
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uhippocampus -phippocampus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 24

      opensearch:
        image: opensearchproject/opensearch:3.1.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 24

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The full suite (with the service containers above) gates the release: a failing test here
      # stops the GitHub release and the downstream image publish. cmd/ is excluded from the run to
      # match hooks/pre-commit and the release runbook - main-package wiring is exercised by the
      # docker smoke tests in CI, not by unit coverage. Coverage is NOT reported to Coveralls from
      # here: a tag-triggered run reports under the tag ref, never main, so it would leave the
      # ?branch=main badge stale - the CI workflow reports it on push to main instead.
      - name: Test (excluding cmd/)
        env:
          HIPPOCAMPUS_TEST_POSTGRES_DSN: postgres://hippocampus:hippocampus@localhost:5432/hippocampus_test?sslmode=disable
          HIPPOCAMPUS_TEST_MYSQL_DSN: hippocampus:hippocampus@tcp(localhost:3306)/hippocampus_test
          HIPPOCAMPUS_TEST_OPENSEARCH_URL: http://localhost:9200
        run: go test $(go list ./... | grep -v '/cmd/')

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --verify-tag refuses to release a ref that is not an existing tag; --generate-notes builds
        # the changelog from merged PRs since the previous tag.
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag

  # Cross-compile both binaries and attach them to the release, so an end user can grab a runnable
  # tool without a Go toolchain - most valuable for cmd/hippocampus-mcp, which an MCP host (Claude
  # Desktop/Code) spawns locally over stdio. Everything is pure Go with CGO disabled, so the whole
  # OS/arch matrix cross-compiles from one runner with no cross toolchain. Gated on `release` so the
  # release the assets attach to already exists. A single job (rather than a build matrix) keeps the
  # checksums in one file; the builds are seconds each.
  binaries:
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: write # upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The tag is stamped into each binary via -ldflags -X, matching the Dockerfile: the service
      # binary reads main.buildVersion, the MCP bridge reads main.version. Each platform archive
      # bundles the binary plus LICENSE; Windows gets a .zip, everything else a .tar.gz. A single
      # checksums.txt over all archives lets a downloader verify integrity.
      - name: Cross-compile and archive
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist

          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            export GOOS="${platform%/*}" GOARCH="${platform#*/}"

            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi

            go build -trimpath -ldflags="-s -w -X main.buildVersion=${VERSION}" -o "hippocampus${ext}" ./cmd/hippocampus
            go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "hippocampus-mcp${ext}" ./cmd/hippocampus-mcp

            plat="${GOOS}_${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              zip -q "dist/hippocampus_${VERSION}_${plat}.zip" "hippocampus${ext}" LICENSE
              zip -q "dist/hippocampus-mcp_${VERSION}_${plat}.zip" "hippocampus-mcp${ext}" LICENSE
            else
              tar -czf "dist/hippocampus_${VERSION}_${plat}.tar.gz" "hippocampus${ext}" LICENSE
              tar -czf "dist/hippocampus-mcp_${VERSION}_${plat}.tar.gz" "hippocampus-mcp${ext}" LICENSE
            fi

            rm -f "hippocampus${ext}" "hippocampus-mcp${ext}"
          done

          ( cd dist && sha256sum ./* > checksums.txt )

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --clobber so re-running the workflow on the same tag replaces assets rather than failing.
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  # Build and push the container image to GitHub Container Registry, gated behind the release job
  # so a failing test suite or coverage run publishes nothing. Auth is the built-in GITHUB_TOKEN
  # (no extra secrets); the image name is ghcr.io/<owner>/<repo>. The tag is passed as VERSION so
  # the published binary reports the release version through --version and /healthz.
  publish:
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive the image tags from the git ref: the full version, the major.minor rolling tag, and
      # (for a non-prerelease semver tag, via the default latest=auto flavor) latest.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # The MCP bridge ships as its own image (Dockerfile `target: mcp`) under a separate GHCR
      # package, so the opt-in HTTP compose service - and remote MCP hosts - can pull it instead of
      # building. Same tag scheme as the service image, VERSION stamped into main.version.
      - name: Derive MCP image tags
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
