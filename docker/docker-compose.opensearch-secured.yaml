# Hippocampus with the embedded SQLite storage plus the optional OpenSearch content-search
# index, with the OpenSearch security plugin ENABLED - the secured counterpart to
# docker-compose.opensearch.yaml. Use this as the reference for a real deployment: the cluster
# requires basic-auth credentials and serves HTTPS, and Hippocampus connects over TLS with
# credentials injected via the environment rather than baked into the committed config.
#
#   OPENSEARCH_ADMIN_PASSWORD='Choose-A-Strong-One_1!' \
#     docker compose -f docker/docker-compose.opensearch-secured.yaml up --build
#
# TLS trust in this demo: the OpenSearch image bootstraps SELF-SIGNED demo certificates, so
# config.opensearch-secured.json sets opensearch.tls.insecureSkipVerify to true purely to make the
# self-signed cert acceptable. THAT IS A DEMO-ONLY SHORTCUT. In production, leave
# insecureSkipVerify false and set opensearch.tls.caCertFile to the PEM bundle for the CA that
# signed the cluster's certificate (and opensearch.tls.certFile / keyFile for mutual TLS if the
# cluster requires a client certificate).
#
# The index is a rebuildable secondary: losing the opensearch volume loses nothing but search
# availability until memories are re-stored.

services:
  hippocampus:
    build: ..
    ports:
      - "50051:50051" # gRPC
      - "8080:8080" # HTTP/JSON gateway (+ /healthz)
    volumes:
      - hippocampus-data:/data
      - ./config.opensearch-secured.json:/etc/hippocampus/config.json:ro
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      # Inject the OpenSearch password as a secret (env override of opensearch.password) rather
      # than committing it to the config file. The username stays "admin" in the config.
      HIPPOCAMPUS_OPENSEARCH_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD:-Hippocampus_Demo_1!}"
      # Ship metrics/traces to the otel-lgtm collector only when OBSERVABILITY is set and the
      # `observability` profile is active; off by default so no export failures are logged.
      HIPPOCAMPUS_OBSERVABILITY_METRICS_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_TRACING_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_ENDPOINT: "otel-lgtm:4317"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_INSECURE: "true"

  opensearch:
    image: opensearchproject/opensearch:3.1.0
    environment:
      discovery.type: single-node
      # Security plugin left ENABLED (no DISABLE_SECURITY_PLUGIN): the cluster now requires
      # authentication and serves HTTPS with the bootstrapped demo certificates.
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${OPENSEARCH_ADMIN_PASSWORD:-Hippocampus_Demo_1!}"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      # HTTPS + admin auth + -k (self-signed demo cert), mirroring how Hippocampus connects.
      test:
        [
          "CMD-SHELL",
          "curl -skf -u admin:${OPENSEARCH_ADMIN_PASSWORD:-Hippocampus_Demo_1!} https://localhost:9200/_cluster/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 24

  # All-in-one observability backend (Grafana on :3000). Off by default; started only with
  # `--profile observability`. See docker-compose.yaml for the OBSERVABILITY=true invocation.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["observability"]
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP/gRPC ingest
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json
    volumes:
      - ./observability/hippocampus-dashboard.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json:ro
      - ./observability/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro

volumes:
  hippocampus-data:
  opensearch-data:
