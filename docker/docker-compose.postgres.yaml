# Hippocampus backed by PostgreSQL. The postgres-driver config is mounted over the image's
# default SQLite config; persistence lives in the postgres volume, so the hippocampus container
# itself is stateless and needs no data volume.
#
#   docker compose -f docker/docker-compose.postgres.yaml up --build
#
# Note consolidation.walTriggerBytes is not supported with the Postgres driver (it measures
# SQLite's on-disk WAL file, which has no Postgres counterpart) — the service refuses to start
# with it set. Both capacity axes (consolidation.capacityMemories / capacityBytes) work as usual.

services:
  hippocampus:
    build: ..
    ports:
      - "50051:50051" # gRPC
      - "8080:8080" # HTTP/JSON gateway (+ /healthz)
    volumes:
      - ./config.postgres.json:/etc/hippocampus/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Ship metrics/traces to the otel-lgtm collector only when OBSERVABILITY is set and the
      # `observability` profile is active; off by default so no export failures are logged.
      HIPPOCAMPUS_OBSERVABILITY_METRICS_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_TRACING_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_ENDPOINT: "otel-lgtm:4317"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_INSECURE: "true"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hippocampus
      POSTGRES_PASSWORD: hippocampus
      POSTGRES_DB: hippocampus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hippocampus -d hippocampus"]
      interval: 5s
      timeout: 3s
      retries: 12

  # All-in-one observability backend (Grafana on :3000). Off by default; started only with
  # `--profile observability`. See docker-compose.yaml for the OBSERVABILITY=true invocation.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["observability"]
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP/gRPC ingest
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json
    volumes:
      - ./observability/hippocampus-dashboard.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json:ro
      - ./observability/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro

volumes:
  postgres-data:
