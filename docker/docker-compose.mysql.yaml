# Hippocampus backed by MySQL. The mysql-driver config is mounted over the image's default
# SQLite config; persistence lives in the mysql volume, so the hippocampus container itself is
# stateless and needs no data volume.
#
#   docker compose -f docker/docker-compose.mysql.yaml up --build
#
# Note consolidation.walTriggerBytes is not supported with the MySQL driver (it measures
# SQLite's on-disk WAL file, which has no MySQL counterpart) — the service refuses to start with
# it set. Both capacity axes (consolidation.capacityMemories / capacityBytes) work as usual.

services:
  hippocampus:
    build: ..
    ports:
      - "50051:50051" # gRPC
      - "8080:8080" # HTTP/JSON gateway (+ /healthz)
    volumes:
      - ./config.mysql.json:/etc/hippocampus/config.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Ship metrics/traces to the otel-lgtm collector only when OBSERVABILITY is set and the
      # `observability` profile is active; off by default so no export failures are logged.
      HIPPOCAMPUS_OBSERVABILITY_METRICS_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_TRACING_ENABLED: "${OBSERVABILITY:-false}"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_ENDPOINT: "otel-lgtm:4317"
      HIPPOCAMPUS_OBSERVABILITY_OTLP_INSECURE: "true"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_USER: hippocampus
      MYSQL_PASSWORD: hippocampus
      MYSQL_DATABASE: hippocampus
      MYSQL_ROOT_PASSWORD: hippocampus
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uhippocampus -phippocampus"]
      interval: 5s
      timeout: 3s
      retries: 24

  # All-in-one observability backend (Grafana on :3000). Off by default; started only with
  # `--profile observability`. See docker-compose.yaml for the OBSERVABILITY=true invocation.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["observability"]
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP/gRPC ingest
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json
    volumes:
      - ./observability/hippocampus-dashboard.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/hippocampus.json:ro
      - ./observability/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro

volumes:
  mysql-data:
