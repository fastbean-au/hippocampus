syntax = "proto3";
package proto;
option go_package = "github.com/fastbean-au/hippocampus/contract;contract";

import "google/api/annotations.proto";

enum Bool {
    UNSPECIFIED = 0;
    FALSE = 1;
    TRUE = 2;
}

// SignificancePlacement positions an item's significance relative to existing values instead of
// taking the absolute `significance` field. It exists because significance is a dense integer with
// no room between adjacent values: this lets a client say "just above the 5s" or "between 5 and 6"
// and have the server open a gap for it. Write-only on StoreEvent/StoreMemory/UpdateMemory and
// UpdateEventSignificance; it is never populated on read responses. When mode is UNSPECIFIED the
// absolute `significance` value is used as-is (0 meaning unranked).
message SignificancePlacement {
    enum Mode {
        UNSPECIFIED = 0;  // ignore placement; use the absolute significance value
        ABOVE = 1;        // rank just above the anchor, below the next-higher value
        BELOW = 2;        // rank just below the anchor, above the next-lower value
        BETWEEN = 3;      // rank strictly between the anchor (lower) and upper bounds
    }
    Mode mode = 1;
    int32 anchor = 2;      // anchor significance value; ignored when anchor_id is set
    string anchor_id = 3;  // anchor by an existing item's id, whose significance is looked up
    int32 upper = 4;       // BETWEEN only: the upper bound significance; ignored when upper_id is set
    string upper_id = 5;   // BETWEEN only: the upper bound by an existing item's id
}

message Event {
    string id = 1;
    int64 time_start = 2;  // UnixNano; defaults to the current time when unset (0) on create
    int64 time_end = 3;
    int32 significance = 4;
    string name = 5;
    string description = 6;
    bool memories_consolidated = 7;
    int64 relationship_significance = 8;
    repeated Relationship relationships = 9;
    repeated Memory memories = 10;
    string group = 11;  // optional freeform grouping/context label (system, subsystem, owner, ...)
    SignificancePlacement placement = 12;  // write-only: rank relative to existing values (see SignificancePlacement)
}

message Relationship {
    string event_id = 1;
    int32 significance = 2;
}

message Memory {
    string id = 1;
    int64 time_stamp = 2;  // UnixNano; defaults to the current time when unset (0) on create
    int32 significance = 3;
    string event_id = 4;
    string body = 5;
    Bool is_binary = 6;
    int64 time_recalled = 7;
    int32 recall_count = 8;
    bool is_summary = 9;
    string group = 10;  // optional freeform grouping/context label (system, subsystem, owner, ...)
    SignificancePlacement placement = 11;  // write-only: rank relative to existing values (see SignificancePlacement)
}

// StoreEventResponse carries the stored event's id and how many of its nested memories were
// retained. An event whose significance is below event.minimumSignificance is quietly forgotten,
// like a brain that simply does not retain the insignificant: no error is returned, id is empty,
// memory_count is 0 (its nested memories are not stored either), and rejected is true.
message StoreEventResponse {
    string id = 1;           // the stored event's id; empty when the event was not retained
    int32 memory_count = 2;  // nested memories stored (those below memory.minimumSignificance are dropped)
    bool rejected = 3;       // true when the event was dropped for significance below event.minimumSignificance
}

message EndEventRequest {
    string id = 1;
    int64 time_end = 2;
}

message UpdateEventSignificanceRequest {
    string id = 1;
    int32 significance = 2;
    SignificancePlacement placement = 3;  // write-only: rank relative to existing values (see SignificancePlacement)
}

message MergeEventsRequest {
    string merge_to = 1;
    string merge_from = 2;
}

message DeleteEventRequest {
    string id = 1;
    bool memories = 2;
}

message GetEventByIdRequest {
    string id = 1;
    bool memories = 2;
}

message GetEventResponse {
    Event event = 1;
}

message GetEventsRequest {
    int64 time_start_min = 1;
    int64 time_start_max = 2;
    int64 time_end_min = 3;
    int64 time_end_max = 4;
    int32 significance_min = 5;
    int32 significance_max = 6;
    bool memories = 7;
    string group = 8;  // optional: restrict to events carrying this group label
    string order_by = 9;  // "significance" (significance desc, then time desc) or "timestamp" (time desc); defaults to significance
    int32 limit = 10;  // page size; 0 selects the server default (25), values above the server cap are clamped
    int32 offset = 11;  // rows to skip for pagination
}

message GetEventsResponse {
    repeated Event events = 1;
    int32 total_count = 2;  // events matching the filter, ignoring limit/offset — for pagination
}

message GetMemoriesRequest {
    int64 timestamp_min = 1;
    int64 timestamp_max = 2;
    int32 significance_min = 3;
    int32 significance_max = 4;
    string group = 5;  // optional: restrict to memories carrying this group label
    string order_by = 6;  // "significance" (significance desc, then time desc) or "timestamp" (time desc); defaults to significance
    int32 limit = 7;  // page size; 0 selects the server default (25), values above the server cap are clamped
    int32 offset = 8;  // rows to skip for pagination
}

message GetMemoriesResponse {
    repeated Memory memories = 1;
    int32 total_count = 2;  // memories matching the filter, ignoring limit/offset — for pagination
}

// StoreMemoryResponse carries the stored memory's id. A memory whose significance is below
// memory.minimumSignificance is quietly forgotten, like a brain that simply does not retain the
// insignificant: no error is returned, id is empty, and rejected is true.
message StoreMemoryResponse {
    string id = 1;       // the stored memory's id; empty when the memory was not retained
    bool rejected = 2;   // true when the memory was dropped for significance below memory.minimumSignificance
}

message DeleteMemoriesRequest {
    repeated string ids = 1;
}

message RecallMemoriesRequest {
    repeated string ids = 1;
}

// SearchMemoriesRequest queries the optional secondary content-search index (opensearch.enabled)
// for memories whose body matches the query. Results are always re-read from the primary store,
// which remains authoritative; ids the index returns that the primary store no longer holds are
// silently dropped. When reinforce is true the matched memories are recalled - resetting their
// decay clocks and raising their effective significance - rather than merely fetched.
message SearchMemoriesRequest {
    string query = 1;
    int32 limit = 2;      // maximum results; a value <= 0 selects the default (10)
    string event_id = 3;  // optional: restrict matches to a single event
    bool reinforce = 4;   // route matches through recall, reinforcing them
    string group = 5;     // optional: restrict matches to memories carrying this group label
}

// ReplaceMemoriesWithSummaryRequest asks the service to delete every memory associated with an
// event and replace them with a single caller-supplied summary memory. The service has no
// visibility into memory content, so it cannot generate the summary itself.
message ReplaceMemoriesWithSummaryRequest {
    string event_id = 1;
    Memory summary = 2;
}

message ReplaceMemoriesWithSummaryResponse {
    string id = 1;
    int32 memories_replaced = 2;
}

// SummarizationCandidate identifies an event whose memories have accumulated enough, and gone
// quiet for long enough, to be worth condensing into a single summary memory via
// ReplaceMemoriesWithSummary.
message SummarizationCandidate {
    string event_id = 1;
    string event_name = 2;
    int32 memory_count = 3;
}

message GetSummarizationCandidatesResponse {
    repeated SummarizationCandidate candidates = 1;
}

// ArchiveHeader is the first record of an export archive: a gzip-compressed stream of
// length-delimited ArchiveRecord messages.
message ArchiveHeader {
    int32 version = 1;
    int64 exported_at = 2;  // UnixNano
    int32 event_count = 3;
    int32 memory_count = 4;
}

message ArchiveRecord {
    oneof record {
        ArchiveHeader header = 1;
        Event event = 2;
        Memory memory = 3;
    }
}

// ImportBatchRequest carries full-state rows (original timestamps, recall state, significance,
// group, event links) to be upserted by id into the store as-is - a data migration, not a fresh
// write. It is the ingest half of Transfer and is re-sendable: re-importing the same rows is
// idempotent.
message ImportBatchRequest {
    repeated Event events = 1;
    repeated Memory memories = 2;
}

message ImportBatchResponse {
    int32 events_imported = 1;
    int32 memories_imported = 2;
}

// Export snapshots every event and memory into an archive object in S3 and records a manifest of
// exactly what was captured; with clear set, the captured records are deleted after a successful
// upload (writes and recalls landing mid-run survive, exactly as Clear does).
message ExportRequest {
    bool clear = 1;
}

message ExportResponse {
    string manifest_id = 1;
    string object_key = 2;
    int32 events_exported = 3;
    int32 memories_exported = 4;
    int32 memories_cleared = 5;
    int32 events_cleared = 6;
}

message ImportRequest {
    string object_key = 1;
}

message ImportResponse {
    int32 events_imported = 1;
    int32 memories_imported = 2;
}

// Transfer streams every event and memory directly to a centralised instance's ImportBatch RPC
// (address from transfer.targetAddress); like Export it records a manifest, and with clear set
// deletes the captured records once the target has accepted them all.
message TransferRequest {
    bool clear = 1;
}

message TransferResponse {
    string manifest_id = 1;
    int32 events_transferred = 2;
    int32 memories_transferred = 3;
    int32 memories_cleared = 4;
    int32 events_cleared = 5;
}

// Clear deletes exactly the records captured by the Export/Transfer run that produced the
// manifest: memories are deleted only if neither created nor recalled since the snapshot, and
// events only once they have no memories left. Manifests are held in memory - a restart discards
// them.
message ClearRequest {
    string manifest_id = 1;
}

message ClearResponse {
    int32 memories_cleared = 1;
    int32 events_cleared = 2;
}

message GeneralResponse {
    bool ok = 1;
}

message EmptyRequest {}

// HTTP annotations below map every RPC onto a REST-ish JSON endpoint under /v1, served by the
// grpc-gateway alongside the native gRPC API. Path-bound fields (e.g. {id}) are taken from the
// URL; for GET/DELETE the remaining fields are taken from the query string, and for POST/PATCH
// they are taken from the JSON body.
service Hippocampus {
    rpc Purge(EmptyRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            post: "/v1/purge"
        };
    }

    rpc Sleep(EmptyRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            post: "/v1/sleep"
        };
    }

    //Events
    rpc StoreEvent(Event) returns (StoreEventResponse) {
        option (google.api.http) = {
            post: "/v1/events"
            body: "*"
        };
    }

    rpc EndEvent(EndEventRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            post: "/v1/events/{id}/end"
            body: "*"
        };
    }

    rpc UpdateEventSignificance(UpdateEventSignificanceRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            patch: "/v1/events/{id}/significance"
            body: "*"
        };
    }

    rpc MergeEvents(MergeEventsRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            post: "/v1/events/merge"
            body: "*"
        };
    }

    rpc DeleteEvent(DeleteEventRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            delete: "/v1/events/{id}"
        };
    }

    rpc GetEventById(GetEventByIdRequest) returns (GetEventResponse) {
        option (google.api.http) = {
            get: "/v1/events/{id}"
        };
    }

    rpc GetEvents(GetEventsRequest) returns (GetEventsResponse) {
        option (google.api.http) = {
            get: "/v1/events"
        };
    }

    // Memories
    rpc StoreMemory(Memory) returns (StoreMemoryResponse) {
        option (google.api.http) = {
            post: "/v1/memories"
            body: "*"
        };
    }

    // UpdateMemory applies a partial update to an existing memory: only the fields carrying a value
    // (significance, body, event_id, group, time_stamp) overwrite the stored row. is_binary and
    // is_summary are NOT updatable here - they are set at creation and by ReplaceMemoriesWithSummary
    // - so any updated content must stay consistent with the memory's existing is_binary/is_summary:
    // a non-binary memory is re-indexed for content search, so its new body must remain valid text,
    // and a summary memory should keep summary-appropriate content. An unknown id returns NotFound
    // (no memory is created).
    rpc UpdateMemory(Memory) returns (GeneralResponse) {
        option (google.api.http) = {
            patch: "/v1/memories/{id}"
            body: "*"
        };
    }

    rpc DeleteMemories(DeleteMemoriesRequest) returns (GeneralResponse) {
        option (google.api.http) = {
            post: "/v1/memories/delete"
            body: "*"
        };
    }

    rpc GetMemories(GetMemoriesRequest) returns (GetMemoriesResponse) {
        option (google.api.http) = {
            get: "/v1/memories"
        };
    }

    rpc RecallMemories(RecallMemoriesRequest) returns (GetMemoriesResponse) {
        option (google.api.http) = {
            post: "/v1/memories/recall"
            body: "*"
        };
    }

    rpc SearchMemories(SearchMemoriesRequest) returns (GetMemoriesResponse) {
        option (google.api.http) = {
            post: "/v1/memories/search"
            body: "*"
        };
    }

    // Summarization
    rpc ReplaceMemoriesWithSummary(ReplaceMemoriesWithSummaryRequest) returns (ReplaceMemoriesWithSummaryResponse) {
        option (google.api.http) = {
            post: "/v1/events/{event_id}/summary"
            body: "summary"
        };
    }

    rpc GetSummarizationCandidates(EmptyRequest) returns (GetSummarizationCandidatesResponse) {
        option (google.api.http) = {
            get: "/v1/summarization/candidates"
        };
    }

    // Transfer and archive (embedded -> centralised)
    rpc Export(ExportRequest) returns (ExportResponse) {
        option (google.api.http) = {
            post: "/v1/export"
            body: "*"
        };
    }

    rpc Import(ImportRequest) returns (ImportResponse) {
        option (google.api.http) = {
            post: "/v1/import"
            body: "*"
        };
    }

    rpc ImportBatch(ImportBatchRequest) returns (ImportBatchResponse) {
        option (google.api.http) = {
            post: "/v1/import/batch"
            body: "*"
        };
    }

    rpc Transfer(TransferRequest) returns (TransferResponse) {
        option (google.api.http) = {
            post: "/v1/transfer"
            body: "*"
        };
    }

    rpc Clear(ClearRequest) returns (ClearResponse) {
        option (google.api.http) = {
            post: "/v1/clear"
            body: "*"
        };
    }
}
